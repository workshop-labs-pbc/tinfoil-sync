cvm-version: 0.7.1
cpus: 16
memory: 65536

containers:
  - name: "gcsfuse"
    image: "kapetacom/gcsfuse-ubuntu:v3.2.0"
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor=unconfined
    volumes:
      - /mnt/ramdisk/gcs-bucket:/gcs:rshared
      - /mnt/ramdisk/gcloud_key.json:/key.json:ro
    env:
      - BUCKET_NAME: "pollux-enc-prod"

  - name: "sync"
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/cpu@sha256:d5a452aa55a5528eb78544af3c6fdefda8af5503dba302f9eb021b09d89cb316"
    volumes:
      - /mnt/ramdisk/gcs-bucket:/mnt/gcs
      - /mnt/ramdisk/gcloud_key.json:/key.json:ro
    env:
      - GOOGLE_APPLICATION_CREDENTIALS: "/key.json"
      - GCS_BUCKET: "pollux-enc-prod"
      - GCS_ACCESS: "read-only"
      - POLLUX_LN_GCS_BUCKET: "gs://pollux-enc-prod"
      - POLLUX_GCSFUSE_MOUNT_PATH: "/mnt/gcs"
      - KEY_MODE: "real_keys"
      - LOG_LEVEL: "INFO"
    secrets:
      - DATABASE_URL
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - INTERNAL_SERVICE_SECRET

shim:
  upstream-port: 8000
  paths:
    - /ping
    - /set_dek
    - /v1/user/*
